# Training settings
training:
  batch_size: 16
  eval_batch_size: 32
  num_epochs: 5
  learning_rate: 2e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  fp16: true
  seed: 42
  evaluation_strategy: "epoch"
  save_strategy: "epoch"
  load_best_model_at_end: true
  metric_for_best_model: "f1_weighted"

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
