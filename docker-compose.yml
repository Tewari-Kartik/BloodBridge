# ═══════════════════════════════════════════════
# BloodBridge — Docker Compose
# ═══════════════════════════════════════════════
# One command to run everything:
#   docker compose up --build
#
# Services:
#   backend  → FastAPI (port 8000)
#   frontend → React via nginx (port 3000)

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: bloodbridge-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/backend/models    # Persist trained models
      - ./data:/app/data                        # Persist data files
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: bloodbridge-ui
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
